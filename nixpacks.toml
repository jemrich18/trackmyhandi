[phases.setup]
nixPkgs = ["python312", "postgresql_16.dev", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[phases.build]
cmds = [". /opt/venv/bin/activate && python manage.py collectstatic --noinput && python manage.py migrate"]

[start]
cmd = ". /opt/venv/bin/activate && gunicorn core.wsgi --bind 0.0.0.0:$PORT"